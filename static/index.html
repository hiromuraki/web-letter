<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>LETTER</title>
        <link rel="stylesheet" href="style.css" />
        <script src="script.js" defer></script>
    </head>
    <body>
        <div class="paper-slot-area">
            <div class="paper" id="paper">
                <div class="pull-hint" id="pullHint">向上拉动</div>
                <div class="paper-header" id="paperHeader">
                    <img src="" alt="Avatar" class="avatar" id="letterAvatar" />
                    <h2 id="letterTitle">DECRYPTED_LOG</h2>
                    <div class="date" id="letterDate"></div>
                </div>
                <div class="paper-content" id="paperContent"></div>
            </div>
        </div>

        <div class="machine-container">
            <div class="machine-body">
                <div class="machine-slit"></div>
                <div class="lcd-screen">
                    <input
                        type="text"
                        id="pwdInput"
                        placeholder="点击输入口令"
                        maxlength="8"
                        autocomplete="off"
                        autocapitalize="off"
                        autocorrect="off"
                        spellcheck="false"
                    />
                    <div class="power-light" id="powerLight"></div>
                </div>
                <div class="machine-actions">
                    <button id="submitBtn">接收</button>
                    <button id="resetBtn" type="button">重置</button>
                </div>
            </div>
        </div>
    </body>
</html>
