<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <rel typ></rel>
        <link rel="stylesheet" href="style.css" />
        <script src="script.js" defer></script>
        <title>Letter</title>
    </head>
    <body>
        <div class="noise"></div>

        <audio id="bgMusic" src="/api/music" loop preload="auto"></audio>

        <div class="mail-scene" id="scene">
            <div class="envelope-wrapper">
                <div class="envelope-back"></div>
                <div class="letter-wrapper">
                    <div class="letter-body">
                        <div class="letter-scroll-area">
                            <div class="stamp-decor">❦</div>
                            <div class="text-content" id="letterContainer">
                                <div class="card-title-wrap">
                                    <h1 class="card-title" id="cardTitle"></h1>
                                </div>
                                <div class="card-content" id="cardContent"></div>
                                <div class="card-sign" id="cardSign"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="envelope-pocket"></div>
                <div class="envelope-flap"></div>

                <img class="character-img" id="avatarBtn" src="/api/avatar" alt="封泥" />
                <div class="click-hint">✨ 输入口令以开启 ✨</div>
            </div>
        </div>

        <div class="password-modal" id="pwdModal">
            <div class="modal-box">
                <h3>请输入口令</h3>
                <input
                    type="text"
                    id="pwdInput"
                    placeholder="输入任意内容即可"
                    autocomplete="off"
                />
                <div class="modal-error" id="pwdError">内容不能为空哦</div>
                <button id="submitBtn">拆开信件</button>
            </div>
        </div>
    </body>
</html>
